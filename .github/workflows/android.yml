name: Android APK

on:
  push:
  workflow_dispatch:

jobs:
  apk:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.7.1"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /opt/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Install Godot headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/godot
          curl -fL -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /opt/godot
          mv /opt/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 /opt/godot/godot
          chmod +x /opt/godot/godot

      - name: Cache Android export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-android-templates-${{ env.GODOT_VERSION }}

      - name: Install Android export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          curl -fL -o /tmp/templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q /tmp/templates.tpz "templates/android_*" "templates/version.txt" -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          rm -rf /tmp/templates.tpz /tmp/tpl

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Generate debug keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$HOME/debug.keystore" \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -storepass android -keypass android \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Configure Godot editor settings (Android SDK + debug keystore)
        run: |
          mkdir -p ~/.config/godot
          cat > ~/.config/godot/editor_settings-4.7.tres <<EOF
          [gd_resource type="EditorSettings" format=3]

          [resource]
          export/android/android_sdk_path = "${ANDROID_SDK_ROOT}"
          export/android/java_sdk_path = "${JAVA_HOME}"
          export/android/debug_keystore = "${HOME}/debug.keystore"
          export/android/debug_keystore_user = "androiddebugkey"
          export/android/debug_keystore_pass = "android"
          EOF
          cp ~/.config/godot/editor_settings-4.7.tres ~/.config/godot/editor_settings-4.tres

      - name: Import project
        run: /opt/godot/godot --headless --path . --editor --quit

      - name: Export Android debug APK
        run: |
          mkdir -p build/android
          /opt/godot/godot --headless --path . --export-debug "Android" build/android/iron-corridor-debug.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: iron-corridor-debug-apk
          path: build/android/iron-corridor-debug.apk
