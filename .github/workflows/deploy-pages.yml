name: Deploy Web Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: "4.7.1"
    steps:
      - uses: actions/checkout@v4

      - name: Cache Godot binary
        id: cache-godot
        uses: actions/cache@v4
        with:
          path: /opt/godot
          key: godot-${{ env.GODOT_VERSION }}-linux-x86_64

      - name: Install Godot headless
        if: steps.cache-godot.outputs.cache-hit != 'true'
        run: |
          mkdir -p /opt/godot
          curl -fL -o /tmp/godot.zip "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q /tmp/godot.zip -d /opt/godot
          mv /opt/godot/Godot_v${GODOT_VERSION}-stable_linux.x86_64 /opt/godot/godot
          chmod +x /opt/godot/godot

      - name: Cache Web export templates
        id: cache-templates
        uses: actions/cache@v4
        with:
          path: ~/.local/share/godot/export_templates/${{ env.GODOT_VERSION }}.stable
          key: godot-web-templates-${{ env.GODOT_VERSION }}

      - name: Install Web export templates
        if: steps.cache-templates.outputs.cache-hit != 'true'
        run: |
          mkdir -p ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable
          curl -fL -o /tmp/templates.tpz "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_export_templates.tpz"
          unzip -q /tmp/templates.tpz "templates/web_*" "templates/version.txt" -d /tmp/tpl
          mv /tmp/tpl/templates/* ~/.local/share/godot/export_templates/${GODOT_VERSION}.stable/
          rm -rf /tmp/templates.tpz /tmp/tpl

      - name: Import project
        run: /opt/godot/godot --headless --path . --editor --quit

      - name: Export Web build (3D, served under /3d/)
        run: |
          mkdir -p build/web/3d
          /opt/godot/godot --headless --path . --export-release "Web" build/web/3d/index.html

      - name: Add coi-serviceworker shim (SharedArrayBuffer headers)
        run: cp web_shim/coi-serviceworker.js build/web/3d/coi-serviceworker.js

      - name: Add 2D game at site root
        run: cp web2d/index.html web2d/sim2d.js build/web/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
