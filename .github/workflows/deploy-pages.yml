name: Deploy Web Build

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Assemble site (2D game at root, 3D mirror at /3d/)
        run: |
          mkdir -p build/web/3d
          cp web2d/index.html web2d/sim2d.js build/web/
          cp web3d/index.html web3d/render3d.js web3d/three.module.min.js build/web/3d/
          # the 3D shell runs the exact same sim as the 2D game
          cp web2d/sim2d.js build/web/3d/sim2d.js

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
